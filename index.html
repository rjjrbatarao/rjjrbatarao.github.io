    <title>XLink Xmachines</title>
    <style type='text/css'>
	:root {
		--timer-start: 3s;
	}
	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
		font-family: 'Poppins', sans-serif;
	}
	body {
		display: flex;
		justify-content: center;
		align-items: center;
		min-height: 100vh;
		background: #0a0808;
	}
	.container {
		position: relative;
		width: 256px;
		height: 256px;
		display: flex;
		justify-content: center;
		align-items: center;
	}
	.container span {
		position: absolute;
		left: 0;
		width: 32px;
		height: 6px;
		background: #2c4766;
		border-radius: 8px;
		transform-origin: 128px;
		transform: scale(2.2) rotate(calc(var(--i) * (360deg / 50)));
		animation: animateBlink var(--timer-start) linear infinite;
		animation-delay: calc(var(--i) * (var(--timer-start) / 50));
	}
	@keyframes animateBlink {
		0% {
			background: #ab0218;
		}
		25% {
			background: #2c4766;
		}
	}
	.login-box {
		position: absolute;
		width: 400px;
	}
	.login-box form {
		width: 100%;
		padding: 0 50px;
	}
	h3 {
		padding: 10px;
		color: #ff2400;
		text-align: center;	
	}
	h2 {
		font-size: 2em;
		color: #ab0218;
		text-align: center;
	}
	h1 {
		font-size: 5em;
		color: #ab0218;
		text-align: center;
	}
	.input-box {
		position: relative;
		margin: 25px 0;
	}
	.input-box input {
		width: 100%;
		height: 50px;
		background: transparent;
		border: 2px solid #2c4766;
		outline: none;
		border-radius: 40px;
		font-size: 1em;
		color: #fff;
		padding: 0 20px;
		transition: .1s ease;
	}
	.input-box input:focus,
	.input-box input:valid {
		border-color: #ab0218;
	}
	.input-box label {
		position: absolute;
		top: 50%;
		left: 20px;
		transform: translateY(-50%);
		font-size: 1em;
		color: #fff;
		pointer-events: none;
		transition: .1s ease;
	}
	.input-box input:focus~label,
	.input-box input:valid~label {
		top: 1px;
		font-size: .8em;
		background: #1f293a;
		padding: 0 6px;
		color: #ab0218;
	}
	.btn {
		width: 100%;
		height: 45px;
		background: #ab0218;
		border: none;
		outline: none;
		border-radius: 40px;
		cursor: pointer;
		font-size: 1em;
		color: #1f293a;
		font-weight: 600;
		margin-bottom: 20px;
	}
	.signup-link {
		margin: 20px 0 10px;
		text-align: center;
	}
	.signup-link a {
		font-size: 1em;
		color: #ab0218;
		text-decoration: none;
		font-weight: 600;
	}
	.signup-link a:hover {
		text-decoration: underline;
	}
	.scale-down-center {
		-webkit-animation: scale-down-center 0.3s cubic-bezier(0.250, 0.460, 0.450, 0.940) both;
				animation: scale-down-center 0.3s cubic-bezier(0.250, 0.460, 0.450, 0.940) both;
	}
	
	@-webkit-keyframes scale-down-center {
	  0% {
		-webkit-transform: scale(1);
				transform: scale(1);
	  }
	  100% {
		-webkit-transform: scale(0.0);
				transform: scale(0.0);
	  }
	}
	@keyframes scale-down-center {
	  0% {
		-webkit-transform: scale(1);
				transform: scale(1);
	  }
	  100% {
		-webkit-transform: scale(0.0);
				transform: scale(0.0);
	  }
	}
	.scale-up-center {
		-webkit-animation: scale-up-center 0.3s cubic-bezier(0.390, 0.575, 0.565, 1.000) both;
	        animation: scale-up-center 0.3s cubic-bezier(0.390, 0.575, 0.565, 1.000) both;
	}
	@-webkit-keyframes scale-up-center {
	  0% {
		-webkit-transform: scale(0.0);
				transform: scale(0.0);
	  }
	  100% {
		-webkit-transform: scale(1);
				transform: scale(1);
	  }
	}
	@keyframes scale-up-center {
	  0% {
		-webkit-transform: scale(0.0);
				transform: scale(0.0);
	  }
	  100% {
		-webkit-transform: scale(1);
				transform: scale(1);
	  }
	}

	.roblox-icon {
	  margin: 10px;
	  width: 100px;
	  height: 100px;
	}
		
	</style>
</head>
